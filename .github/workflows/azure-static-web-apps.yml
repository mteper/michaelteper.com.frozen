name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy static site
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          # Get the deployment token from the Azure portal:
          #   Azure Static Web Apps resource → Overview → Manage deployment token
          # Then add it as a GitHub secret named AZURE_STATIC_WEB_APPS_API_TOKEN:
          #   GitHub repo → Settings → Secrets and variables → Actions → New repository secret
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          app_location: "/"
          skip_app_build: true
          output_location: ""
